<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Книга рецептов</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7A2E2E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Рецепты">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,800&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F0E7D4; --paper-shadow:#D9C9A0; --ink:#2B2519; --ink-soft:#5C5342;
    --burgundy:#7A2E2E; --burgundy-dark:#5C2222; --sage:#586B4D; --mustard:#C68A2E;
    --card:#FBF6EA; --line:#D9CBA6; --green:#4C7A5C; --red:#B5453D;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--paper);
    background-image:radial-gradient(circle at 1px 1px, rgba(0,0,0,0.04) 1px, transparent 0);
    background-size:18px 18px; color:var(--ink); font-family:'Inter',sans-serif;
    min-height:100vh; min-height:100dvh; padding-top:env(safe-area-inset-top);
  }
  button{ font-family:'Inter',sans-serif; }
  .app{ display:flex; min-height:100vh; min-height:100dvh; }
  .sidebar{ width:230px; flex-shrink:0; padding:26px 0 26px 18px; border-right:2px solid var(--line); display:flex; flex-direction:column; }
  .brand{ font-family:'Fraunces',serif; font-weight:800; font-size:25px; color:var(--burgundy-dark); margin:0 20px 3px 0; line-height:1.1; }
  .brand-sub{ font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-soft); margin:0 20px 6px 0; }
  .sync-status{ font-size:10.5px; color:var(--sage); margin:0 20px 18px 0; display:flex; align-items:center; gap:5px; }
  .sync-dot{ width:6px;height:6px;border-radius:50%; background:var(--sage); flex-shrink:0; }
  .sync-dot.offline{ background:var(--mustard); }
  .quick-actions{ display:flex; flex-direction:column; gap:6px; margin:0 20px 18px 0; }
  .qa-btn{ display:flex; align-items:center; gap:7px; padding:8px 10px; border-radius:6px; border:1.5px solid var(--line); background:var(--card); font-size:12.5px; font-weight:600; color:var(--ink-soft); cursor:pointer; text-align:left; }
  .qa-btn:hover{ border-color:var(--sage); color:var(--ink); }
  .cat-list{ list-style:none; margin:0; padding:0; overflow-y:auto; flex:1; }
  .cat-tab{ display:flex; align-items:center; gap:8px; padding:8px 14px 8px 12px; margin-bottom:4px; border-radius:6px 0 0 6px; cursor:pointer; font-size:13.5px; color:var(--ink-soft); border-right:4px solid transparent; }
  .cat-tab:hover{ background:rgba(122,46,46,0.06); color:var(--ink); }
  .cat-tab.active{ background:var(--card); color:var(--burgundy-dark); font-weight:600; border-right-color:var(--mustard); box-shadow:-2px 2px 6px rgba(0,0,0,0.04); }
  .cat-emoji{ font-size:14px; width:16px; text-align:center; flex-shrink:0; }
  .cat-count{ margin-left:auto; font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--ink-soft); opacity:.7; }
  .add-btn{ margin:18px 20px 0 0; width:calc(100% - 20px); padding:11px 14px; background:var(--burgundy); color:#F5EEDD; border:none; border-radius:6px; font-weight:700; font-size:13.5px; cursor:pointer; }
  .add-btn:hover{ background:var(--burgundy-dark); }
  .add-btn:active{ transform:scale(0.98); }
  .main{ flex:1; padding:28px 36px 60px; max-width:1200px; min-width:0; }
  .topbar{ display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:18px; flex-wrap:wrap; }
  .view-title{ font-family:'Fraunces',serif; font-weight:700; font-size:27px; margin:0; color:var(--ink); }
  .search-wrap{ position:relative; }
  .search-wrap input{ width:240px; padding:9px 14px 9px 34px; border:1.5px solid var(--line); border-radius:20px; background:var(--card); font-size:13.5px; color:var(--ink); outline:none; }
  .search-wrap input:focus{ border-color:var(--sage); }
  .search-wrap svg{ position:absolute; left:12px; top:50%; transform:translateY(-50%); opacity:.5; }
  .filters-row{ display:flex; gap:8px; margin-bottom:22px; flex-wrap:wrap; align-items:center; }
  .filter-chip{ padding:6px 13px; border-radius:16px; border:1.5px solid var(--line); background:var(--card); font-size:12px; font-weight:600; color:var(--ink-soft); cursor:pointer; white-space:nowrap; }
  .filter-chip.active{ background:var(--burgundy); border-color:var(--burgundy); color:#F5EEDD; }
  .sort-select{ margin-left:auto; padding:6px 10px; border-radius:16px; border:1.5px solid var(--line); background:var(--card); font-size:12px; color:var(--ink-soft); font-weight:600; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(240px,1fr)); gap:18px; }
  .recipe-card{ background:var(--card); border-radius:3px; padding:16px 16px 14px; cursor:pointer; position:relative; border:1px solid var(--line); box-shadow:0 2px 0 var(--paper-shadow), 0 4px 10px rgba(43,37,25,0.06); transition:transform .15s ease, box-shadow .15s ease; }
  .recipe-card::before{ content:""; position:absolute; top:0; left:20px; width:32px; height:9px; background:var(--mustard); opacity:.85; border-radius:0 0 3px 3px; }
  .recipe-card:hover{ transform:translateY(-3px) rotate(-0.3deg); box-shadow:0 3px 0 var(--paper-shadow), 0 10px 18px rgba(43,37,25,0.12); }
  .card-top{ display:flex; justify-content:space-between; align-items:flex-start; margin-top:8px; }
  .card-cat{ font-family:'IBM Plex Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--sage); }
  .fav-btn{ background:none; border:none; cursor:pointer; font-size:16px; color:var(--line); padding:0; line-height:1; }
  .fav-btn.active{ color:var(--mustard); }
  .card-title{ font-family:'Fraunces',serif; font-weight:600; font-size:18px; line-height:1.25; margin:6px 0 10px; color:var(--ink); }
  .card-meta{ display:flex; gap:10px; flex-wrap:wrap; font-size:11.5px; color:var(--ink-soft); border-top:1px dashed var(--line); padding-top:9px; align-items:center; }
  .badge{ padding:2px 7px; border-radius:9px; font-size:10px; font-weight:700; }
  .badge.Легко{ background:rgba(76,122,92,0.15); color:var(--green); }
  .badge.Средне{ background:rgba(198,138,46,0.18); color:var(--mustard); }
  .badge.Сложно{ background:rgba(181,69,61,0.15); color:var(--red); }
  .empty-state{ text-align:center; padding:70px 20px; color:var(--ink-soft); }
  .empty-state h3{ font-family:'Fraunces',serif; font-size:21px; color:var(--ink); margin-bottom:8px; }
  .overlay{ position:fixed; inset:0; background:rgba(43,37,25,0.45); display:none; align-items:flex-start; justify-content:center; padding:40px 16px; overflow-y:auto; z-index:50; }
  .overlay.open{ display:flex; }
  .modal{ background:var(--card); width:100%; max-width:680px; border-radius:6px; padding:30px 32px 28px; position:relative; box-shadow:0 20px 50px rgba(0,0,0,0.25); }
  .modal-close{ position:absolute; top:16px; right:18px; background:none; border:none; cursor:pointer; font-size:20px; color:var(--ink-soft); line-height:1; z-index:2; }
  .modal-close:hover{ color:var(--ink); }
  .detail-cat{ font-family:'IBM Plex Mono',monospace; font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--sage); margin-bottom:6px; display:flex; align-items:center; gap:10px; }
  .detail-title{ font-family:'Fraunces',serif; font-weight:700; font-size:28px; margin:0 0 12px; color:var(--ink); padding-right:30px; }
  .detail-meta-row{ display:flex; gap:10px; flex-wrap:wrap; margin-bottom:18px; }
  .meta-pill{ display:flex; align-items:center; gap:5px; padding:5px 11px; border-radius:14px; background:rgba(88,107,77,0.1); font-size:12px; color:var(--ink-soft); font-weight:600; }
  .servings-adjust{ display:flex; align-items:center; gap:8px; background:var(--paper); border:1px solid var(--line); border-radius:14px; padding:4px 6px; }
  .servings-adjust button{ width:22px; height:22px; border-radius:50%; border:1px solid var(--line); background:#fff; cursor:pointer; font-weight:700; color:var(--burgundy); line-height:1; }
  .servings-adjust span{ font-family:'IBM Plex Mono',monospace; font-size:12.5px; min-width:60px; text-align:center; }
  .detail-actions-top{ display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
  .btn{ padding:9px 15px; border-radius:6px; border:1.5px solid var(--line); background:transparent; font-size:12.5px; font-weight:700; cursor:pointer; color:var(--ink-soft); display:inline-flex; align-items:center; gap:6px; }
  .btn:hover{ border-color:var(--ink-soft); color:var(--ink); }
  .btn-danger:hover{ border-color:var(--burgundy); color:var(--burgundy); }
  .btn-primary{ background:var(--burgundy); color:#F5EEDD; border:none; }
  .btn-primary:hover{ background:var(--burgundy-dark); color:#F5EEDD; }
  .btn-cook{ background:var(--sage); color:#F5EEDD; border:none; }
  .btn-cook:hover{ background:#465e3d; color:#F5EEDD; }
  .detail-section h4{ font-family:'Fraunces',serif; font-size:15.5px; font-weight:600; color:var(--burgundy-dark); margin:0 0 10px; border-bottom:1px solid var(--line); padding-bottom:6px; }
  .ing-list{ list-style:none; padding:0; margin:0 0 20px; }
  .ing-list li{ padding:7px 4px; font-size:14px; display:flex; justify-content:space-between; gap:10px; border-bottom:1px dotted var(--line); cursor:pointer; user-select:none; }
  .ing-list li.checked{ opacity:.4; text-decoration:line-through; }
  .ing-list li span.amt{ font-family:'IBM Plex Mono',monospace; color:var(--ink-soft); font-size:12.5px; white-space:nowrap; flex-shrink:0; }
  .steps-list{ margin:0; padding:0; list-style:none; counter-reset:step; }
  .steps-list li{ counter-increment:step; display:flex; gap:12px; margin-bottom:13px; font-size:14px; line-height:1.55; }
  .steps-list li::before{ content:counter(step); font-family:'Fraunces',serif; font-weight:700; color:#fff; background:var(--burgundy); width:23px; height:23px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:12.5px; }
  .step-timer-tag{ font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--sage); margin-left:6px; white-space:nowrap; }
  .detail-notes{ background:rgba(198,138,46,0.12); border-left:3px solid var(--mustard); padding:11px 13px; font-size:13px; color:var(--ink-soft); border-radius:0 4px 4px 0; margin-top:4px; }
  .form-title{ font-family:'Fraunces',serif; font-weight:700; font-size:22px; margin:0 0 18px; color:var(--ink); }
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft); margin-bottom:6px; }
  .field input, .field textarea, .field select{ width:100%; padding:9px 11px; border:1.5px solid var(--line); border-radius:5px; background:#fff; font-size:14px; color:var(--ink); outline:none; resize:vertical; font-family:'Inter',sans-serif; }
  .field input:focus, .field textarea:focus, .field select:focus{ border-color:var(--sage); }
  .row2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .row4{ display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:12px; }
  .form-actions{ display:flex; justify-content:flex-end; gap:10px; margin-top:20px; }
  .ing-row, .step-row{ display:flex; gap:6px; margin-bottom:8px; align-items:flex-start; }
  .ing-row input:nth-child(1){ width:70px; flex-shrink:0; }
  .ing-row select{ width:110px; flex-shrink:0; }
  .ing-row input:nth-child(3){ flex:1; }
  .step-row textarea{ flex:1; }
  .step-row input{ width:75px; flex-shrink:0; }
  .row-remove{ background:none; border:none; color:var(--red); cursor:pointer; font-size:18px; padding:6px 4px; line-height:1; flex-shrink:0; }
  .row-add{ background:var(--paper); border:1.5px dashed var(--line); border-radius:6px; padding:8px 12px; font-size:12.5px; font-weight:700; color:var(--ink-soft); cursor:pointer; width:100%; margin-bottom:14px; }
  .row-add:hover{ border-color:var(--sage); color:var(--ink); }
  .setup-banner{ background:#5C2222; color:#F5EEDD; padding:14px 20px; font-size:13px; line-height:1.5; }
  .setup-banner a{ color:#F0C77A; }

  .cook-overlay{ position:fixed; inset:0; background:var(--paper); z-index:100; display:none; flex-direction:column; }
  .cook-overlay.open{ display:flex; }
  .cook-header{ display:flex; align-items:center; justify-content:space-between; padding:16px 22px; border-bottom:2px solid var(--line); flex-shrink:0; }
  .cook-title{ font-family:'Fraunces',serif; font-weight:700; font-size:17px; color:var(--ink); }
  .cook-close{ background:none; border:none; font-size:24px; color:var(--ink-soft); cursor:pointer; }
  .cook-progress{ display:flex; gap:5px; padding:12px 22px; flex-shrink:0; }
  .cook-dot{ flex:1; height:5px; border-radius:3px; background:var(--line); }
  .cook-dot.done{ background:var(--sage); }
  .cook-dot.current{ background:var(--burgundy); }
  .cook-body{ flex:1; display:flex; align-items:center; justify-content:center; padding:20px 30px; overflow-y:auto; }
  .cook-step{ max-width:560px; text-align:center; }
  .cook-step-num{ font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--sage); margin-bottom:14px; letter-spacing:.1em; text-transform:uppercase; }
  .cook-step-text{ font-family:'Fraunces',serif; font-size:26px; line-height:1.4; color:var(--ink); margin-bottom:26px; }
  .cook-timer{ display:inline-flex; flex-direction:column; align-items:center; gap:10px; }
  .cook-timer-display{ font-family:'IBM Plex Mono',monospace; font-size:44px; font-weight:600; color:var(--burgundy-dark); }
  .cook-timer-display.ringing{ animation:pulse 0.6s infinite; color:var(--red); }
  @keyframes pulse{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.08); } }
  .cook-timer-btns{ display:flex; gap:8px; }
  .cook-footer{ display:flex; align-items:center; justify-content:space-between; padding:18px 22px; border-top:2px solid var(--line); flex-shrink:0; gap:12px; }
  .cook-nav-btn{ padding:12px 20px; border-radius:8px; border:none; font-weight:700; font-size:14px; cursor:pointer; }
  .cook-nav-btn.prev{ background:var(--card); border:1.5px solid var(--line); color:var(--ink-soft); }
  .cook-nav-btn.next{ background:var(--burgundy); color:#F5EEDD; }
  .cook-nav-btn:disabled{ opacity:.35; cursor:default; }
  .cook-ing-toggle{ background:none; border:1.5px solid var(--line); border-radius:8px; padding:10px 14px; font-size:12.5px; font-weight:700; color:var(--ink-soft); cursor:pointer; }
  .cook-ing-panel{ position:fixed; right:0; top:0; bottom:0; width:280px; background:var(--card); border-left:2px solid var(--line); z-index:110; display:none; flex-direction:column; padding:20px; overflow-y:auto; }
  .cook-ing-panel.open{ display:flex; }
  .cook-done-screen{ text-align:center; }
  .cook-done-screen .emoji{ font-size:56px; margin-bottom:14px; }

  @media (max-width:720px){
    .app{ flex-direction:column; }
    .sidebar{ width:100%; border-right:none; border-bottom:2px solid var(--line); padding:18px 18px 14px; max-height:none; }
    .cat-list{ display:flex; flex-wrap:wrap; gap:6px; overflow-y:visible; }
    .cat-tab{ border-radius:16px; border-right:none; padding:6px 11px; }
    .cat-tab.active{ box-shadow:none; }
    .add-btn{ width:100%; margin:14px 0 0; }
    .main{ padding:20px 16px 50px; }
    .search-wrap input{ width:100%; }
    .row2, .row4{ grid-template-columns:1fr; }
    .cook-step-text{ font-size:21px; }
    .cook-timer-display{ font-size:36px; }
    .cook-ing-panel{ width:80%; }
    .quick-actions{ margin-bottom:12px; }
  }
</style>
</head>
<body>

<div id="setupBanner" style="display:none;" class="setup-banner">
  ⚠️ Firebase не настроен. Открой <code>firebase-config.js</code> и вставь ключи своего проекта.
</div>

<div class="app">
  <aside class="sidebar">
    <p class="brand">Книга рецептов</p>
    <p class="brand-sub" id="loadingLabel">загрузка…</p>
    <p class="sync-status"><span class="sync-dot" id="syncDot"></span><span id="syncText">синхронизация…</span></p>
    <div class="quick-actions">
      <button class="qa-btn" id="randomBtn">🎲 Что приготовить?</button>
      <button class="qa-btn" id="favToggleSidebar">⭐ Избранное</button>
    </div>
    <ul class="cat-list" id="catList"></ul>
    <button class="add-btn" id="openAddBtn">+ Добавить рецепт</button>
  </aside>

  <main class="main">
    <div class="topbar">
      <h2 class="view-title" id="viewTitle">Все рецепты</h2>
      <div class="search-wrap">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="searchInput" placeholder="Поиск по названию или ингредиенту…">
      </div>
    </div>
    <div class="filters-row">
      <button class="filter-chip" data-diff="Легко">Легко</button>
      <button class="filter-chip" data-diff="Средне">Средне</button>
      <button class="filter-chip" data-diff="Сложно">Сложно</button>
      <select class="sort-select" id="sortSelect">
        <option value="new">Сначала новые</option>
        <option value="old">Сначала старые</option>
        <option value="az">По алфавиту</option>
        <option value="time">По времени готовки</option>
      </select>
    </div>
    <div class="grid" id="grid"></div>
    <div class="empty-state" id="emptyState" style="display:none;">
      <h3>Ничего не найдено</h3>
      <p>Попробуй изменить фильтры или добавь новый рецепт.</p>
    </div>
  </main>
</div>

<div class="overlay" id="detailOverlay"><div class="modal" id="detailModal"></div></div>

<div class="overlay" id="formOverlay">
  <div class="modal" style="max-width:720px;">
    <button class="modal-close" id="formCloseBtn">&times;</button>
    <p class="form-title" id="formTitle">Новый рецепт</p>
    <div class="field"><label>Название</label><input type="text" id="f-title" placeholder="Например: Сырники"></div>
    <div class="row4">
      <div class="field"><label>Категория</label><input type="text" id="f-category" list="catOptions" placeholder="Завтраки"><datalist id="catOptions"></datalist></div>
      <div class="field"><label>Порций</label><input type="number" id="f-servings" min="1" value="4"></div>
      <div class="field"><label>Время, мин</label><input type="number" id="f-cooktime" min="1" value="30"></div>
      <div class="field"><label>Сложность</label><select id="f-difficulty"><option>Легко</option><option>Средне</option><option>Сложно</option></select></div>
    </div>

    <label style="display:block; font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft); margin-bottom:6px;">Ингредиенты</label>
    <div id="ingRows"></div>
    <button type="button" class="row-add" id="addIngRow">+ Добавить ингредиент</button>

    <label style="display:block; font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft); margin-bottom:6px;">Шаги приготовления</label>
    <div id="stepRows"></div>
    <button type="button" class="row-add" id="addStepRow">+ Добавить шаг</button>

    <div class="field"><label>Заметки (необязательно)</label><textarea id="f-notes" rows="2" placeholder="Советы, замены…"></textarea></div>
    <div class="form-actions">
      <button class="btn" id="formCancelBtn">Отмена</button>
      <button class="btn btn-primary" id="formSaveBtn">Сохранить рецепт</button>
    </div>
  </div>
</div>

<div class="cook-overlay" id="cookOverlay">
  <div class="cook-header">
    <span class="cook-title" id="cookTitle">Режим готовки</span>
    <div style="display:flex; gap:10px; align-items:center;">
      <button class="cook-ing-toggle" id="cookIngToggle">🧺 Ингредиенты</button>
      <button class="cook-close" id="cookCloseBtn">&times;</button>
    </div>
  </div>
  <div class="cook-progress" id="cookProgress"></div>
  <div class="cook-body" id="cookBody"></div>
  <div class="cook-footer">
    <button class="cook-nav-btn prev" id="cookPrevBtn">← Назад</button>
    <span id="cookStepCounter" style="font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--ink-soft);"></span>
    <button class="cook-nav-btn next" id="cookNextBtn">Дальше →</button>
  </div>
</div>
<div class="cook-ing-panel" id="cookIngPanel">
  <h4 style="font-family:'Fraunces',serif; margin-top:0;">Ингредиенты</h4>
  <ul class="ing-list" id="cookIngList"></ul>
</div>

<script type="module">
import { firebaseConfig } from './firebase-config.js';
import { seedRecipes } from './recipes-seed.js';
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import {
  getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, getDoc, setDoc, writeBatch,
  onSnapshot, query, orderBy, enableIndexedDbPersistence
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const CATEGORY_EMOJI = {
  "Десерты":"🍰","Основные блюда":"🍲","Супы":"🍜","Салаты":"🥗","Выпечка":"🥐","Напитки":"🥤","Без категории":"📄"
};
const UNITS = ["г","кг","мл","л","ст.л.","ч.л.","шт","по вкусу","щепотка"];

const isConfigured = firebaseConfig.apiKey && !firebaseConfig.apiKey.includes('ВСТАВЬ');
if (!isConfigured) document.getElementById('setupBanner').style.display = 'block';

let db, auth, recipesCol;
if (isConfigured) {
  const app = initializeApp(firebaseConfig);
  db = getFirestore(app);
  auth = getAuth(app);
  recipesCol = collection(db, 'recipes');
  try { await enableIndexedDbPersistence(db); } catch (e) {}
}

const syncDot = document.getElementById('syncDot');
const syncText = document.getElementById('syncText');
window.addEventListener('online', () => setSyncStatus(true));
window.addEventListener('offline', () => setSyncStatus(false));
function setSyncStatus(online){
  syncDot.classList.toggle('offline', !online);
  syncText.textContent = online ? 'синхронизировано' : 'офлайн (сохранится позже)';
}
setSyncStatus(navigator.onLine);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
}

let recipes = [];
let activeCategory = 'Все';
let editingId = null;
let searchQuery = '';
let activeDifficulty = null;
let favOnly = false;
let sortMode = 'new';

const catList = document.getElementById('catList');
const grid = document.getElementById('grid');
const emptyState = document.getElementById('emptyState');
const viewTitle = document.getElementById('viewTitle');
const loadingLabel = document.getElementById('loadingLabel');

function escapeHtml(s){ return (String(s)||'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function fmtQty(q){ if(q===null||q===undefined) return ''; return (Math.round(q*10)/10).toString(); }

async function seedIfNeeded(){
  const flagRef = doc(db, 'meta', 'status');
  const flagSnap = await getDoc(flagRef);
  if (flagSnap.exists() && flagSnap.data().seeded) return;
  try {
    let batch = writeBatch(db);
    let count = 0;
    for (const r of seedRecipes) {
      const newRef = doc(recipesCol);
      batch.set(newRef, { ...r, favorite:false, dateAdded: new Date(Date.now() - (seedRecipes.length-count)*1000).toISOString() });
      count++;
      if (count % 400 === 0) { await batch.commit(); batch = writeBatch(db); }
    }
    await batch.commit();
    await setDoc(flagRef, { seeded:true, seededAt: new Date().toISOString() });
  } catch(e){ console.error('Seeding failed', e); }
}

function getCategories(){
  const set = new Set(recipes.map(r=>r.category || 'Без категории'));
  return Array.from(set).sort((a,b)=>a.localeCompare(b,'ru'));
}

function renderCategories(){
  const cats = getCategories();
  let html = `<li class="cat-tab ${activeCategory==='Все'?'active':''}" data-cat="Все">
    <span class="cat-emoji">📚</span>Все рецепты<span class="cat-count">${recipes.length}</span></li>`;
  cats.forEach(c=>{
    const count = recipes.filter(r=>(r.category||'Без категории')===c).length;
    const emoji = CATEGORY_EMOJI[c] || '🍽️';
    html += `<li class="cat-tab ${activeCategory===c?'active':''}" data-cat="${escapeHtml(c)}">
      <span class="cat-emoji">${emoji}</span>${escapeHtml(c)}<span class="cat-count">${count}</span></li>`;
  });
  catList.innerHTML = html;
  catList.querySelectorAll('.cat-tab').forEach(el=>{
    el.addEventListener('click', ()=>{ activeCategory = el.dataset.cat; render(); });
  });
  document.getElementById('catOptions').innerHTML = cats.map(c=>`<option value="${escapeHtml(c)}">`).join('');
}

document.querySelectorAll('.filter-chip').forEach(chip=>{
  chip.addEventListener('click', ()=>{
    const d = chip.dataset.diff;
    activeDifficulty = activeDifficulty === d ? null : d;
    document.querySelectorAll('.filter-chip').forEach(c=>c.classList.toggle('active', c.dataset.diff===activeDifficulty));
    render();
  });
});
document.getElementById('sortSelect').addEventListener('change', (e)=>{ sortMode = e.target.value; render(); });
document.getElementById('favToggleSidebar').addEventListener('click', ()=>{ favOnly = !favOnly; render(); });
document.getElementById('randomBtn').addEventListener('click', ()=>{
  const list = getFilteredList();
  if(list.length===0) return;
  openDetail(list[Math.floor(Math.random()*list.length)].id);
});

function getFilteredList(){
  let list = recipes.filter(r => activeCategory==='Все' || (r.category||'Без категории')===activeCategory);
  if(activeDifficulty) list = list.filter(r => (r.difficulty||'Легко') === activeDifficulty);
  if(favOnly) list = list.filter(r => r.favorite);
  if(searchQuery){
    const q = searchQuery.toLowerCase();
    list = list.filter(r => r.title.toLowerCase().includes(q) || (r.ingredients||[]).some(i => (i.name||'').toLowerCase().includes(q)));
  }
  const sorted = [...list];
  if(sortMode==='new') sorted.sort((a,b)=> new Date(b.dateAdded||0) - new Date(a.dateAdded||0));
  else if(sortMode==='old') sorted.sort((a,b)=> new Date(a.dateAdded||0) - new Date(b.dateAdded||0));
  else if(sortMode==='az') sorted.sort((a,b)=> a.title.localeCompare(b.title,'ru'));
  else if(sortMode==='time') sorted.sort((a,b)=> (a.cookTime||9999) - (b.cookTime||9999));
  return sorted;
}

function render(){
  renderCategories();
  viewTitle.textContent = favOnly ? '⭐ Избранное' : (activeCategory === 'Все' ? 'Все рецепты' : activeCategory);
  const list = getFilteredList();

  if(list.length === 0){ grid.style.display='none'; emptyState.style.display='block'; return; }
  grid.style.display = 'grid'; emptyState.style.display = 'none';

  grid.innerHTML = list.map(r => `
    <div class="recipe-card" data-id="${r.id}">
      <div class="card-top">
        <div class="card-cat">${escapeHtml(r.category || 'Без категории')}</div>
        <button class="fav-btn ${r.favorite?'active':''}" data-favid="${r.id}">${r.favorite?'★':'☆'}</button>
      </div>
      <p class="card-title">${escapeHtml(r.title)}</p>
      <div class="card-meta">
        ${r.cookTime ? `<span>⏱ ${r.cookTime} мин</span>` : (r.meta?`<span>${escapeHtml(r.meta)}</span>`:'')}
        ${r.servings ? `<span>👥 ${r.servings}</span>` : ''}
        ${r.difficulty ? `<span class="badge ${r.difficulty}">${r.difficulty}</span>` : ''}
      </div>
    </div>`).join('');

  grid.querySelectorAll('.recipe-card').forEach(el=>{
    el.addEventListener('click', (e)=>{ if(e.target.closest('.fav-btn')) return; openDetail(el.dataset.id); });
  });
  grid.querySelectorAll('.fav-btn').forEach(el=>{
    el.addEventListener('click', async (e)=>{
      e.stopPropagation();
      const r = recipes.find(x=>x.id===el.dataset.favid);
      await updateDoc(doc(db,'recipes',r.id), { favorite: !r.favorite });
    });
  });
}

let currentServings = null;
let checkedIngredients = new Set();

function scaledQty(q, base, target){
  if(q===null || q===undefined || !base) return null;
  return q * (target/base);
}

function openDetail(id){
  const r = recipes.find(x=>x.id===id);
  if(!r) return;
  currentServings = r.servings || null;
  checkedIngredients = new Set();
  renderDetail(r);
  document.getElementById('detailOverlay').classList.add('open');
}

function renderDetail(r){
  const modal = document.getElementById('detailModal');
  const base = r.servings || null;
  const target = currentServings || base;
  const ingredientsHtml = (r.ingredients||[]).map((i,idx)=>{
    const qty = (i.qty!==undefined && i.qty!==null && base) ? scaledQty(i.qty, base, target) : i.qty;
    const amtStr = (qty!==null && qty!==undefined) ? `${fmtQty(qty)} ${i.unit||''}`.trim() : (i.unit||'');
    return `<li data-idx="${idx}" class="${checkedIngredients.has(idx)?'checked':''}">
      <span>${escapeHtml(i.name)}</span><span class="amt">${escapeHtml(amtStr)}</span></li>`;
  }).join('');

  const stepsHtml = (r.steps||[]).map(s=>{
    const text = typeof s === 'string' ? s : s.text;
    const tm = typeof s === 'object' ? s.timerMinutes : null;
    return `<li>${escapeHtml(text)}${tm?`<span class="step-timer-tag">⏱ ${tm} мин</span>`:''}</li>`;
  }).join('');

  modal.innerHTML = `
    <button class="modal-close" id="detailCloseBtn">&times;</button>
    <div class="detail-cat">
      <span>${CATEGORY_EMOJI[r.category]||'🍽️'} ${escapeHtml(r.category || 'Без категории')}</span>
      ${r.difficulty ? `<span class="badge ${r.difficulty}">${r.difficulty}</span>` : ''}
    </div>
    <h2 class="detail-title">${escapeHtml(r.title)}</h2>
    <div class="detail-meta-row">
      ${r.cookTime ? `<span class="meta-pill">⏱ ${r.cookTime} мин</span>` : (r.meta ? `<span class="meta-pill">${escapeHtml(r.meta)}</span>` : '')}
      ${base ? `<div class="servings-adjust">
        <button id="servMinus">−</button>
        <span>👥 ${target} порц.</span>
        <button id="servPlus">+</button>
      </div>` : ''}
    </div>
    <div class="detail-actions-top">
      <button class="btn btn-cook" id="startCookBtn">👨‍🍳 Режим готовки</button>
      <button class="btn" id="shareBtn">📋 Скопировать</button>
      <button class="btn" id="favDetailBtn">${r.favorite?'★ В избранном':'☆ В избранное'}</button>
      <button class="btn" id="editBtn">Изменить</button>
      <button class="btn btn-danger" id="deleteBtn">Удалить</button>
    </div>
    <div class="detail-section"><h4>Ингредиенты</h4><ul class="ing-list" id="detailIngList">${ingredientsHtml}</ul></div>
    <div class="detail-section"><h4>Приготовление</h4><ol class="steps-list">${stepsHtml}</ol></div>
    ${r.notes ? `<div class="detail-notes">💡 ${escapeHtml(r.notes)}</div>` : ''}
  `;

  document.getElementById('detailCloseBtn').addEventListener('click', closeDetail);
  document.getElementById('editBtn').addEventListener('click', ()=>{ closeDetail(); openForm(r); });
  document.getElementById('deleteBtn').addEventListener('click', async ()=>{
    if(confirm('Удалить рецепт «'+r.title+'»?')){ await deleteDoc(doc(db,'recipes',r.id)); closeDetail(); }
  });
  document.getElementById('startCookBtn').addEventListener('click', ()=> startCookMode(r));
  document.getElementById('favDetailBtn').addEventListener('click', async ()=>{
    await updateDoc(doc(db,'recipes',r.id), { favorite: !r.favorite });
  });
  document.getElementById('shareBtn').addEventListener('click', ()=> copyRecipeText(r));

  const sPlus = document.getElementById('servPlus');
  const sMinus = document.getElementById('servMinus');
  if(sPlus) sPlus.addEventListener('click', ()=>{ currentServings = (currentServings||base)+1; renderDetail(r); });
  if(sMinus) sMinus.addEventListener('click', ()=>{ currentServings = Math.max(1,(currentServings||base)-1); renderDetail(r); });

  document.querySelectorAll('#detailIngList li').forEach(li=>{
    li.addEventListener('click', ()=>{
      const idx = parseInt(li.dataset.idx);
      if(checkedIngredients.has(idx)) checkedIngredients.delete(idx); else checkedIngredients.add(idx);
      li.classList.toggle('checked');
    });
  });
}

function copyRecipeText(r){
  let text = `${r.title}\n${r.category||''} · ${r.servings?r.servings+' порц.':''} ${r.cookTime?'· '+r.cookTime+' мин':''}\n\nИнгредиенты:\n`;
  (r.ingredients||[]).forEach(i=>{ text += `- ${i.name}${i.qty?` — ${fmtQty(i.qty)} ${i.unit||''}`:''}\n`; });
  text += `\nПриготовление:\n`;
  (r.steps||[]).forEach((s,idx)=>{ const t = typeof s==='string'?s:s.text; text += `${idx+1}. ${t}\n`; });
  if(r.notes) text += `\nЗаметка: ${r.notes}`;
  navigator.clipboard?.writeText(text).then(()=>{
    const btn = document.getElementById('shareBtn');
    if(btn){ const old = btn.textContent; btn.textContent='✓ Скопировано'; setTimeout(()=>btn.textContent=old, 1500); }
  }).catch(()=>{ alert('Не удалось скопировать'); });
}

function closeDetail(){ document.getElementById('detailOverlay').classList.remove('open'); }
document.getElementById('detailOverlay').addEventListener('click', (e)=>{ if(e.target.id === 'detailOverlay') closeDetail(); });

function ingRowHtml(i){
  const qty = i && i.qty!==undefined && i.qty!==null ? i.qty : '';
  const unit = i ? (i.unit||'г') : 'г';
  const name = i ? (i.name||'') : '';
  return `<div class="ing-row">
    <input type="number" step="0.1" class="ing-qty" placeholder="кол-во" value="${qty}">
    <select class="ing-unit">${UNITS.map(u=>`<option ${u===unit?'selected':''}>${u}</option>`).join('')}</select>
    <input type="text" class="ing-name" placeholder="название" value="${escapeHtml(name)}">
    <button type="button" class="row-remove">×</button>
  </div>`;
}
function stepRowHtml(s){
  const text = s ? (typeof s==='string' ? s : s.text) : '';
  const tm = s && typeof s==='object' ? (s.timerMinutes||'') : '';
  return `<div class="step-row">
    <textarea rows="2" class="step-text" placeholder="Что делать на этом шаге">${escapeHtml(text)}</textarea>
    <input type="number" class="step-timer" placeholder="таймер, мин" value="${tm}">
    <button type="button" class="row-remove">×</button>
  </div>`;
}

function addIngRow(data){
  const wrap = document.getElementById('ingRows');
  const div = document.createElement('div');
  div.innerHTML = ingRowHtml(data);
  const row = div.firstElementChild;
  row.querySelector('.row-remove').addEventListener('click', ()=> row.remove());
  wrap.appendChild(row);
}
function addStepRow(data){
  const wrap = document.getElementById('stepRows');
  const div = document.createElement('div');
  div.innerHTML = stepRowHtml(data);
  const row = div.firstElementChild;
  row.querySelector('.row-remove').addEventListener('click', ()=> row.remove());
  wrap.appendChild(row);
}
document.getElementById('addIngRow').addEventListener('click', ()=> addIngRow(null));
document.getElementById('addStepRow').addEventListener('click', ()=> addStepRow(null));

function openForm(recipe){
  editingId = recipe ? recipe.id : null;
  document.getElementById('formTitle').textContent = recipe ? 'Редактировать рецепт' : 'Новый рецепт';
  document.getElementById('f-title').value = recipe ? recipe.title : '';
  document.getElementById('f-category').value = recipe ? (recipe.category||'') : '';
  document.getElementById('f-servings').value = recipe ? (recipe.servings||4) : 4;
  document.getElementById('f-cooktime').value = recipe ? (recipe.cookTime||30) : 30;
  document.getElementById('f-difficulty').value = recipe ? (recipe.difficulty||'Легко') : 'Легко';
  document.getElementById('f-notes').value = recipe ? (recipe.notes||'') : '';

  document.getElementById('ingRows').innerHTML = '';
  document.getElementById('stepRows').innerHTML = '';
  if(recipe && recipe.ingredients && recipe.ingredients.length){
    recipe.ingredients.forEach(i=> addIngRow(i));
  } else { addIngRow(null); addIngRow(null); addIngRow(null); }
  if(recipe && recipe.steps && recipe.steps.length){
    recipe.steps.forEach(s=> addStepRow(s));
  } else { addStepRow(null); addStepRow(null); }

  document.getElementById('formOverlay').classList.add('open');
}
function closeForm(){ document.getElementById('formOverlay').classList.remove('open'); editingId = null; }

document.getElementById('openAddBtn').addEventListener('click', ()=> openForm(null));
document.getElementById('formCloseBtn').addEventListener('click', closeForm);
document.getElementById('formCancelBtn').addEventListener('click', closeForm);
document.getElementById('formOverlay').addEventListener('click', (e)=>{ if(e.target.id === 'formOverlay') closeForm(); });

document.getElementById('formSaveBtn').addEventListener('click', async ()=>{
  const title = document.getElementById('f-title').value.trim();
  if(!title){ alert('Введите название рецепта'); return; }

  const ingredients = Array.from(document.querySelectorAll('#ingRows .ing-row')).map(row=>{
    const qtyRaw = row.querySelector('.ing-qty').value;
    const name = row.querySelector('.ing-name').value.trim();
    return name ? { qty: qtyRaw==='' ? null : parseFloat(qtyRaw), unit: row.querySelector('.ing-unit').value, name } : null;
  }).filter(Boolean);

  const steps = Array.from(document.querySelectorAll('#stepRows .step-row')).map(row=>{
    const text = row.querySelector('.step-text').value.trim();
    const tmRaw = row.querySelector('.step-timer').value;
    return text ? { text, timerMinutes: tmRaw==='' ? null : parseInt(tmRaw) } : null;
  }).filter(Boolean);

  const data = {
    title,
    category: document.getElementById('f-category').value.trim() || 'Без категории',
    servings: parseInt(document.getElementById('f-servings').value) || 4,
    cookTime: parseInt(document.getElementById('f-cooktime').value) || 30,
    difficulty: document.getElementById('f-difficulty').value,
    ingredients, steps,
    notes: document.getElementById('f-notes').value.trim(),
    dateAdded: new Date().toISOString()
  };

  if(editingId){
    const existing = recipes.find(r=>r.id===editingId);
    await updateDoc(doc(db, 'recipes', editingId), { ...data, favorite: existing ? !!existing.favorite : false });
  } else {
    await addDoc(recipesCol, { ...data, favorite:false });
  }
  closeForm();
});

document.getElementById('searchInput').addEventListener('input', (e)=>{ searchQuery = e.target.value; render(); });

let cookRecipe = null;
let cookStepIdx = 0;
let cookTimerInterval = null;
let cookTimerSeconds = 0;
let cookTimerRunning = false;
let wakeLock = null;

async function requestWakeLock(){
  try { if('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch(e){}
}
function releaseWakeLock(){ if(wakeLock){ wakeLock.release().catch(()=>{}); wakeLock = null; } }

function startCookMode(r){
  cookRecipe = r;
  cookStepIdx = 0;
  document.getElementById('cookTitle').textContent = r.title;
  document.getElementById('cookOverlay').classList.add('open');
  renderCookIngredients(r);
  renderCookStep();
  requestWakeLock();
}
function stopCookMode(){
  document.getElementById('cookOverlay').classList.remove('open');
  document.getElementById('cookIngPanel').classList.remove('open');
  clearInterval(cookTimerInterval);
  cookTimerInterval = null;
  releaseWakeLock();
}
document.getElementById('cookCloseBtn').addEventListener('click', stopCookMode);
document.getElementById('cookIngToggle').addEventListener('click', ()=> document.getElementById('cookIngPanel').classList.toggle('open'));

function renderCookIngredients(r){
  const list = document.getElementById('cookIngList');
  list.innerHTML = (r.ingredients||[]).map(i=>{
    const amt = (i.qty!==null && i.qty!==undefined) ? `${fmtQty(i.qty)} ${i.unit||''}` : (i.unit||'');
    return `<li><span>${escapeHtml(i.name)}</span><span class="amt">${escapeHtml(amt)}</span></li>`;
  }).join('');
  list.querySelectorAll('li').forEach(li=> li.addEventListener('click', ()=> li.classList.toggle('checked')));
}

function renderCookStep(){
  clearInterval(cookTimerInterval); cookTimerInterval = null; cookTimerRunning = false;
  const steps = cookRecipe.steps || [];
  const total = steps.length;
  const s = steps[cookStepIdx];

  document.getElementById('cookProgress').innerHTML = steps.map((_,i)=>
    `<div class="cook-dot ${i<cookStepIdx?'done':(i===cookStepIdx?'current':'')}"></div>`
  ).join('');
  document.getElementById('cookStepCounter').textContent = `${Math.min(cookStepIdx+1,total)} / ${total}`;

  const body = document.getElementById('cookBody');
  if(cookStepIdx >= total){
    body.innerHTML = `<div class="cook-done-screen"><div class="emoji">🎉</div>
      <p class="cook-step-text">Готово! Приятного аппетита</p></div>`;
    document.getElementById('cookNextBtn').textContent = 'Завершить';
    document.getElementById('cookPrevBtn').disabled = false;
    return;
  }
  const text = typeof s === 'string' ? s : s.text;
  const tm = typeof s === 'object' ? s.timerMinutes : null;
  cookTimerSeconds = tm ? tm*60 : 0;

  document.getElementById('cookNextBtn').textContent = cookStepIdx === total-1 ? 'Завершить' : 'Дальше →';
  document.getElementById('cookPrevBtn').disabled = cookStepIdx === 0;

  body.innerHTML = `<div class="cook-step">
    <div class="cook-step-num">Шаг ${cookStepIdx+1} из ${total}</div>
    <div class="cook-step-text">${escapeHtml(text)}</div>
    ${tm ? `<div class="cook-timer">
      <div class="cook-timer-display" id="timerDisplay">${formatTimer(cookTimerSeconds)}</div>
      <div class="cook-timer-btns">
        <button class="btn btn-primary" id="timerStartBtn">▶ Старт</button>
        <button class="btn" id="timerResetBtn">↺ Сброс</button>
      </div>
    </div>` : ''}
  </div>`;

  if(tm){
    document.getElementById('timerStartBtn').addEventListener('click', toggleTimer);
    document.getElementById('timerResetBtn').addEventListener('click', ()=>{
      clearInterval(cookTimerInterval); cookTimerInterval=null; cookTimerRunning=false;
      cookTimerSeconds = tm*60;
      document.getElementById('timerDisplay').textContent = formatTimer(cookTimerSeconds);
      document.getElementById('timerDisplay').classList.remove('ringing');
      document.getElementById('timerStartBtn').textContent = '▶ Старт';
    });
  }
}
function formatTimer(sec){
  const m = Math.floor(sec/60), s = sec%60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function toggleTimer(){
  const btn = document.getElementById('timerStartBtn');
  if(cookTimerRunning){
    clearInterval(cookTimerInterval); cookTimerInterval=null; cookTimerRunning=false;
    btn.textContent = '▶ Старт';
    return;
  }
  cookTimerRunning = true;
  btn.textContent = '⏸ Пауза';
  cookTimerInterval = setInterval(()=>{
    cookTimerSeconds--;
    const disp = document.getElementById('timerDisplay');
    if(!disp){ clearInterval(cookTimerInterval); return; }
    disp.textContent = formatTimer(Math.max(0,cookTimerSeconds));
    if(cookTimerSeconds <= 0){
      clearInterval(cookTimerInterval); cookTimerInterval=null; cookTimerRunning=false;
      disp.classList.add('ringing');
      if(navigator.vibrate) navigator.vibrate([300,100,300,100,300]);
      try{
        const ctx = new (window.AudioContext||window.webkitAudioContext)();
        const o = ctx.createOscillator(); const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination); o.frequency.value = 880;
        o.start(); g.gain.setValueAtTime(0.2, ctx.currentTime);
        setTimeout(()=>{ o.stop(); ctx.close(); }, 700);
      }catch(e){}
    }
  }, 1000);
}
document.getElementById('cookPrevBtn').addEventListener('click', ()=>{ if(cookStepIdx>0){ cookStepIdx--; renderCookStep(); } });
document.getElementById('cookNextBtn').addEventListener('click', ()=>{
  cookStepIdx++;
  if(cookStepIdx > (cookRecipe.steps||[]).length){ stopCookMode(); return; }
  renderCookStep();
});

if (isConfigured) {
  onAuthStateChanged(auth, async (user) => {
    if (!user) { signInAnonymously(auth).catch(err => { loadingLabel.textContent = 'ошибка входа'; console.error(err); }); return; }
    await seedIfNeeded();
    const q = query(recipesCol, orderBy('dateAdded', 'asc'));
    onSnapshot(q, (snapshot) => {
      recipes = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      loadingLabel.textContent = recipes.length + (recipes.length===1?' рецепт':' рецептов');
      setSyncStatus(true);
      render();
    }, (err) => { console.error(err); setSyncStatus(false); });
  });
} else {
  loadingLabel.textContent = 'настрой Firebase';
  render();
}
</script>
</body>
</html>
